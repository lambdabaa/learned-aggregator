metadata:
  name: Trajectory Corpus Generation Flow
  description: 'Generates scored trajectory data for training the LearnedMLPAggregator. Each input row (a MATH problem) is fanned out to N=8 trajectories, each generated by the policy LLM, step-scored by Qwen2.5-Math-PRM-7B via transformers + MPS at fp16, and labelled
    correct/incorrect via math_verify.

    '
  version: 1.0.0
  author: learned-aggregator
  tags:
  - math-reasoning
  - process-reward-model
  - data-generation
  recommended_models:
    default: Qwen/Qwen2.5-1.5B-Instruct
  dataset_requirements:
    required_columns:
    - problem
    - ground_truth
    description: 'Each row is one MATH problem. problem is the question text; ground_truth is the reference answer (may be wrapped in \boxed{}).

      '
  id: dry-day-296
blocks:
- block_type: PromptBuilderBlock
  block_config:
    block_name: build_math_prompt
    input_cols:
    - problem
    output_cols: messages
    prompt_config_path: prompts/math_system.yaml
    format_as_messages: true
- block_type: RowMultiplierBlock
  block_config:
    block_name: fan_out_trajectories
    num_samples: 8
    shuffle: false
- block_type: MLXChatBlock
  block_config:
    block_name: generate_trajectory
    input_cols:
    - messages
    output_cols:
    - trajectory_text
    temperature: 0.7
    max_tokens: 2048
- block_type: ProcessRewardScoreBlock
  block_config:
    block_name: score_steps
    input_cols:
    - problem
    - trajectory_text
    output_cols:
    - step_scores
    step_sep: '


      '
    backend: transformers
- block_type: MathVerifyAnswerBlock
  block_config:
    block_name: verify_answer
    input_cols:
    - trajectory_text
    - ground_truth
    output_cols:
    - extracted_answer
    - correct
