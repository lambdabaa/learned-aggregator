metadata:
  name: Trajectory Corpus Generation Flow
  description: >
    Generates scored trajectory data for training the LearnedMLPAggregator.
    Each input row (a MATH problem) is fanned out to N=8 trajectories, each
    generated by the policy LLM, step-scored by Qwen2.5-Math-PRM-7B via MLX,
    and labelled correct/incorrect via math_verify.
  version: "1.0.0"
  author: learned-aggregator
  tags:
    - math-reasoning
    - process-reward-model
    - data-generation
  recommended_models:
    default: Qwen/Qwen2.5-1.5B-Instruct
  dataset_requirements:
    required_columns:
      - problem
      - ground_truth
    description: >
      Each row is one MATH problem. problem is the question text;
      ground_truth is the reference answer (may be wrapped in \boxed{}).

blocks:
  # Step 1: wrap the math problem in the Qwen step-by-step system prompt.
  - block_type: PromptBuilderBlock
    block_config:
      block_name: build_math_prompt
      input_cols:
        - problem
      output_cols: messages
      prompt_config_path: prompts/math_system.yaml
      format_as_messages: true

  # Step 2: fan out to N=8 trajectories per problem.
  - block_type: RowMultiplierBlock
    block_config:
      block_name: fan_out_trajectories
      num_samples: 8
      shuffle: false

  # Step 3: generate each trajectory with the policy LLM.
  #   The full step-by-step response (steps separated by '\n\n') is the trajectory.
  - block_type: LLMChatBlock
    block_config:
      block_name: generate_trajectory
      input_cols: messages
      output_cols: trajectory_text
      async_mode: true
      temperature: 0.7

  # Step 4: score each reasoning step with the PRM (Apple Silicon / MLX).
  #   Calls MLXProcessRewardModel once per step prefix; outputs list[float].
  - block_type: MLXProcessRewardScoreBlock
    block_config:
      block_name: score_steps
      input_cols:
        - problem
        - trajectory_text
      output_cols:
        - step_scores
      step_sep: "\n\n"

  # Step 5: extract the final \boxed{} answer and label correctness.
  - block_type: MathVerifyAnswerBlock
    block_config:
      block_name: verify_answer
      input_cols:
        - trajectory_text
        - ground_truth
      output_cols:
        - extracted_answer
        - correct
